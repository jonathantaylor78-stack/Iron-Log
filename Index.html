<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14161A">
<title>Iron Log</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #14161A; color: #E8E6DF; font-family: system-ui, -apple-system, sans-serif; }
  .app { max-width: 560px; margin: 0 auto; padding: 16px 14px 48px; }
  .title { font-size: 26px; font-weight: 800; letter-spacing: .14em; }
  .subtitle { font-size: 12px; color: #8A919C; margin-top: 2px; }
  .row { display: flex; gap: 6px; margin-top: 14px; }
  .phase { flex: 1; padding: 9px 0; background: #1C2027; color: #8A919C; border: 1px solid #2A2F38; border-radius: 8px; font-size: 13px; font-weight: 700; }
  .phase.on { background: #F5A623; color: #14161A; border-color: #F5A623; }
  .phasesub { font-size: 12px; color: #8A919C; margin: 8px 2px 12px; }
  .days { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 4px; }
  .day { flex: 1 0 auto; min-width: 62px; padding: 7px 8px; background: #1C2027; border: 1px solid #2A2F38; border-radius: 8px; color: #8A919C; text-align: center; }
  .day.on { border-color: #F5A623; color: #E8E6DF; }
  .day b { display: block; font-size: 11px; font-family: ui-monospace, Menlo, monospace; }
  .day span { font-size: 10.5px; }
  h2 { font-size: 17px; margin: 14px 2px 10px; }
  .card { background: #1C2027; border: 1px solid #2A2F38; border-radius: 12px; padding: 12px 12px 14px; margin-bottom: 10px; }
  .exhead { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .exname { font-size: 15px; font-weight: 700; }
  .scheme { font-size: 12px; color: #F5A623; font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
  .last { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 12.5px; margin: 7px 0 9px; }
  .beat { font-size: 10px; font-weight: 800; letter-spacing: .1em; color: #14161A; background: #F5A623; border-radius: 4px; padding: 1px 5px; }
  .mono { font-family: ui-monospace, Menlo, monospace; }
  .dim { color: #6E7580; }
  .pr { color: #3FDD8C; font-weight: 800; font-size: 11px; }
  .setrow { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .setnum { width: 16px; font-size: 11px; color: #6E7580; font-family: ui-monospace, Menlo, monospace; text-align: right; }
  input, textarea { background: #14161A; border: 1px solid #2A2F38; border-radius: 7px; color: #E8E6DF; padding: 8px 10px; font-size: 15px; }
  .setrow input { flex: 1; min-width: 0; font-family: ui-monospace, Menlo, monospace; }
  .btns { display: flex; gap: 8px; margin-top: 10px; }
  button { cursor: pointer; }
  .ghost { padding: 8px 12px; background: transparent; border: 1px solid #2A2F38; border-radius: 8px; color: #8A919C; font-size: 13px; }
  .log { flex: 1; padding: 8px 0; background: #2A2F38; border: 1px solid #3A404B; border-radius: 8px; color: #E8E6DF; font-size: 13.5px; font-weight: 700; }
  .log.done { background: #1F3A2C; border-color: #2E9E63; color: #3FDD8C; }
  .panel { margin-top: 20px; background: #1C2027; border: 1px solid #F5A62355; border-radius: 12px; padding: 14px; }
  .panel h3 { margin: 0 0 10px; font-size: 15px; }
  .panel textarea { width: 100%; font-size: 13.5px; margin-bottom: 8px; font-family: inherit; }
  .panel .report { font-family: ui-monospace, Menlo, monospace; font-size: 12px; white-space: pre; }
  .big { width: 100%; padding: 11px 0; background: #F5A623; border: none; border-radius: 8px; color: #14161A; font-size: 14.5px; font-weight: 800; margin-bottom: 8px; }
  .big.green { background: #2E9E63; color: #E8E6DF; }
  .backup { margin-top: 16px; }
  .backup button { margin-right: 8px; }
  .foot { margin-top: 18px; font-size: 12px; color: #6E7580; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="title">IRON LOG</div>
  <div class="subtitle">60-Day Strength &amp; Growth · shoulder-safe build</div>

  <div class="row" id="phaseRow"></div>
  <div class="phasesub" id="phaseSub"></div>
  <div class="days" id="dayRow"></div>
  <h2 id="dayTitle"></h2>
  <div id="exList"></div>

  <div class="panel">
    <h3>Share progress with Claude</h3>
    <textarea id="notes" rows="2" placeholder="Optional notes — sleep, soreness, shoulder, anything off…"></textarea>
    <button class="big" onclick="buildReport()">Build weekly report</button>
    <textarea id="reportOut" class="report hidden" rows="12" readonly onclick="this.select()"></textarea>
    <button id="copyBtn" class="big hidden" onclick="copyReport()">Copy report</button>
  </div>

  <div class="backup">
    <button class="ghost" onclick="exportData()">Back up data</button>
    <button class="ghost" onclick="importData()">Restore data</button>
  </div>

  <div class="foot">Rule of the house: beat the book.<br>Data lives in this browser — back it up now and then.</div>
</div>

<script>
// ---------- PROGRAM (shoulder-safe: no dips, no barbell back squat) ----------
const PROGRAM = {
  b1: { label: "Block 1 · Strength", sub: "Weeks 1–4 · heavy, 1–2 reps in reserve", days: [
    { name: "Chest", ex: [
      ["b1c1","Flat DB Press","5 × 4–6",5],
      ["b1c2","Incline DB Press","4 × 6–8",4],
      ["b1c3","Decline Barbell Press","3 × 6–10",3],
      ["b1c4","High-to-Low Cable Crossover","3 × 12–15",3],
      ["b1c5","Decline DB Fly","2 × 12–15",2]]},
    { name: "Legs & Glutes", ex: [
      ["b1l1","Belt Squat / Leg Press","5 × 6–8",5],
      ["b1l2","Front Squat (straps)","3 × 6–8",3],
      ["b1l3","Romanian Deadlift (or Leg Curl)","4 × 6–8",4],
      ["b1l4","Hip Thrust","3 × 8–10",3],
      ["b1l5","Walking Lunge","3 × 10/leg",3],
      ["b1l6","Standing Calf Raise","4 × 10–12",4]]},
    { name: "Shoulders & Back", ex: [
      ["b1s1","Lat Pulldown / Pull-Up","4 × 5–8",4],
      ["b1s2","Seated DB Overhead Press","4 × 6–8",4],
      ["b1s3","Chest-Supported Row","4 × 6–8",4],
      ["b1s4","DB Lateral Raise","4 × 12–15",4],
      ["b1s5","Face Pull","3 × 15",3]]},
    { name: "Arms", ex: [
      ["b1a1","Close-Grip Bench Press","4 × 5–8",4],
      ["b1a2","Barbell Curl","4 × 6–8",4],
      ["b1a3","Overhead Cable Extension","3 × 8–10",3],
      ["b1a4","Incline DB Curl","3 × 10–12",3],
      ["b1a5","Rope Pushdown","3 × 12–15",3]]},
    { name: "Core, Balance & Shoulder", ex: [
      ["b1x1","Hanging Leg Raise","4 × 10–15",4],
      ["b1x2","Weighted Cable Crunch","4 × 10–12",4],
      ["b1x3","Pallof Press","3 × 12/side",3],
      ["b1x4","Single-Leg RDL","3 × 10/side",3],
      ["b1x5","Cable External Rotation","3 × 15/side",3],
      ["b1x6","Farmer's Carry","4 × 40m (log lbs)",4]]},
  ]},
  b2: { label: "Block 2 · Growth", sub: "Weeks 6–8 · new exercises, more volume", days: [
    { name: "Chest", ex: [
      ["b2c1","Machine Incline Press","4 × 6–8",4],
      ["b2c2","Flat Machine / Smith Press","4 × 8–12",4],
      ["b2c3","Decline DB Press","3 × 10–12",3],
      ["b2c4","Pec-Deck","3 × 12–15",3],
      ["b2c5","DB Pullover","2 × 12–15",2]]},
    { name: "Legs & Glutes", ex: [
      ["b2l1","Hack Squat / Leg Press (high feet)","4 × 6–8",4],
      ["b2l2","Bulgarian Split Squat","4 × 8–10/leg",4],
      ["b2l3","Lying Leg Curl","3 × 10–12",3],
      ["b2l4","Machine Glute Kickback","3 × 12–15",3],
      ["b2l5","Hip Abduction","3 × 12–15",3],
      ["b2l6","Seated Calf Raise","4 × 12–15",4]]},
    { name: "Shoulders & Back", ex: [
      ["b2s1","Chest-Supported Row","4 × 8–10",4],
      ["b2s2","Machine Shoulder Press","4 × 8–10",4],
      ["b2s3","Neutral-Grip Pulldown","3 × 10–12",3],
      ["b2s4","Cable Lateral Raise","4 × 12–15",4],
      ["b2s5","Reverse Pec-Deck","3 × 12–15",3],
      ["b2s6","DB Shrug","3 × 10–12",3]]},
    { name: "Arms", ex: [
      ["b2a1","EZ-Bar Skullcrusher","4 × 8–12",4],
      ["b2a2","Preacher Curl","4 × 8–12",4],
      ["b2a3","Overhead Cable Extension","3 × 10–12",3],
      ["b2a4","Hammer Curl","3 × 10–12",3],
      ["b2a5","Cable Curl + Pushdown (superset)","3 × 12–15",3]]},
    { name: "Core, Balance & Shoulder", ex: [
      ["b2x1","Ab-Wheel Rollout","4 × 8–12",4],
      ["b2x2","Decline Weighted Sit-Up","3 × 10–12",3],
      ["b2x3","Side Plank Reach-Through","3 × 30s/side (log secs)",3],
      ["b2x4","Cossack Squat","3 × 8/side",3],
      ["b2x5","Band Pull-Apart + Ext. Rotation","3 × 15",3],
      ["b2x6","Suitcase Carry","3 × 40m/side (log lbs)",3]]},
  ]},
};

const KEY = "ironlog-v1";
let hist = {};
try { hist = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch (e) { hist = {}; }
let phase = "b1", dayIdx = 0;

const $ = (id) => document.getElementById(id);
const today = () => new Date().toISOString().slice(0, 10);
const fmtDate = (iso) => new Date(iso + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });
const setStr = (s) => s.map(p => p[0] + "×" + p[1]).join(", ");
const bestSet = (s) => s.reduce((m, p) => Math.max(m, (+p[0] || 0) * (+p[1] || 0)), 0);
const save = () => { try { localStorage.setItem(KEY, JSON.stringify(hist)); } catch (e) { alert("Couldn't save — storage may be blocked or full."); } };
const esc = (t) => t.replace(/&/g,"&amp;").replace(/</g,"&lt;");

function renderPhases() {
  $("phaseRow").innerHTML = [["b1","Block 1"],["dl","Deload"],["b2","Block 2"]].map(([k,l]) =>
    `<button class="phase ${phase===k?"on":""}" onclick="setPhase('${k}')">${l}</button>`).join("");
  $("phaseSub").textContent = phase === "dl"
    ? "Week 5 · ~60% weights, 2–3 sets, stop 4+ reps from failure. Log it anyway."
    : (phase === "b2" ? PROGRAM.b2.sub : PROGRAM.b1.sub);
}
function setPhase(p) { phase = p; render(); }
function setDay(i) { dayIdx = i; render(); }

function render() {
  renderPhases();
  const block = phase === "b2" ? PROGRAM.b2 : PROGRAM.b1;
  $("dayRow").innerHTML = block.days.map((d, i) =>
    `<button class="day ${i===dayIdx?"on":""}" onclick="setDay(${i})"><b>D${i+1}</b><span>${d.name.split(",")[0].split(" &")[0]}</span></button>`).join("");
  const day = block.days[dayIdx];
  $("dayTitle").textContent = "Day " + (dayIdx+1) + " — " + day.name;
  $("exList").innerHTML = day.ex.map(e => cardHTML(e)).join("");
}

function cardHTML([id, name, scheme, nsets]) {
  const h = hist[id] || [];
  const last = h[h.length-1], prev = h[h.length-2];
  const pr = last && prev && bestSet(last.s) > bestSet(prev.s);
  let lastHTML = last
    ? `<div class="last"><span class="beat">BEAT</span><span class="mono">${setStr(last.s)}</span><span class="dim">(${fmtDate(last.d)})</span>${pr?'<span class="pr">▲ PR</span>':''}</div>`
    : `<div class="last dim">First session — set your baseline${phase==="dl"?" at ~60%":""}.</div>`;
  let rows = "";
  for (let i = 0; i < nsets; i++) rows += setRowHTML(id, i);
  return `<div class="card" id="card-${id}">
    <div class="exhead"><div class="exname">${esc(name)}</div><div class="scheme">${esc(scheme)}</div></div>
    ${lastHTML}
    <div id="sets-${id}">${rows}</div>
    <div class="btns">
      <button class="ghost" onclick="addSet('${id}')">+ set</button>
      <button class="log" id="btn-${id}" onclick="logEx('${id}')">Log exercise</button>
    </div></div>`;
}
function setRowHTML(id, i) {
  return `<div class="setrow"><span class="setnum">${i+1}</span>
    <input inputmode="decimal" placeholder="lbs" data-ex="${id}" data-k="w">
    <span class="dim">×</span>
    <input inputmode="numeric" placeholder="reps" data-ex="${id}" data-k="r"></div>`;
}
function addSet(id) {
  const box = $("sets-" + id);
  const n = box.querySelectorAll(".setrow").length;
  box.insertAdjacentHTML("beforeend", setRowHTML(id, n));
}
function logEx(id) {
  const ws = [...document.querySelectorAll(`input[data-ex="${id}"][data-k="w"]`)];
  const rs = [...document.querySelectorAll(`input[data-ex="${id}"][data-k="r"]`)];
  const sets = [];
  for (let i = 0; i < ws.length; i++) {
    const w = parseFloat(ws[i].value), r = parseFloat(rs[i].value);
    if (!isNaN(w) && !isNaN(r) && r > 0) sets.push([w, r]);
  }
  if (!sets.length) return;
  const arr = (hist[id] || []).filter(e => e.d !== today());
  arr.push({ d: today(), s: sets });
  hist[id] = arr.slice(-14);
  save();
  const btn = $("btn-" + id);
  btn.textContent = "Logged ✓"; btn.classList.add("done");
}

// ---------- REPORT ----------
function findEx(id) {
  for (const blk of Object.values(PROGRAM))
    for (const d of blk.days)
      for (const e of d.ex)
        if (e[0] === id) return { blk: blk.label, day: d.name, name: e[1], scheme: e[2] };
  return null;
}
function buildReport() {
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 8);
  const groups = {};
  for (const [id, h] of Object.entries(hist)) {
    if (!h.length) continue;
    const latest = h[h.length-1];
    if (new Date(latest.d + "T12:00:00") < cutoff) continue;
    const meta = findEx(id); if (!meta) continue;
    const key = meta.blk + " — " + meta.day;
    const prev = h[h.length-2];
    let line = "• " + meta.name + " (" + meta.scheme + "): " + setStr(latest.s);
    if (prev) line += "  [prev: " + setStr(prev.s) + "]";
    if (prev && bestSet(latest.s) > bestSet(prev.s)) line += "  ▲";
    (groups[key] = groups[key] || []).push(line);
  }
  let out = ["IRON LOG REPORT — " + fmtDate(today())];
  const keys = Object.keys(groups);
  if (!keys.length) out.push("", "(No sessions logged in the past 8 days.)");
  for (const k of keys) { out.push("", k, ...groups[k]); }
  const n = $("notes").value.trim();
  if (n) out.push("", "Notes: " + n);
  out.push("", "How it felt / shoulder status: ");
  const ta = $("reportOut");
  ta.value = out.join("\n");
  ta.classList.remove("hidden");
  $("copyBtn").classList.remove("hidden");
  $("copyBtn").textContent = "Copy report";
  $("copyBtn").classList.remove("green");
}
function copyReport() {
  const ta = $("reportOut");
  ta.select(); ta.setSelectionRange(0, 999999);
  const done = () => { const b = $("copyBtn"); b.textContent = "Copied — paste it to Claude"; b.classList.add("green"); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(done).catch(() => { document.execCommand("copy"); done(); });
  } else { document.execCommand("copy"); done(); }
}

// ---------- BACKUP ----------
function exportData() {
  const blob = new Blob([JSON.stringify(hist)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ironlog-backup-" + today() + ".json";
  a.click();
}
function importData() {
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = ".json,application/json";
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try { hist = JSON.parse(r.result); save(); render(); alert("Data restored."); }
      catch (e) { alert("That file couldn't be read as a backup."); }
    };
    r.readAsText(f);
  };
  inp.click();
}

render();
</script>
</body>
</html>
